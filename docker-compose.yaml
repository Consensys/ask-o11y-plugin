services:
  grafana:
    extends:
      file: .config/docker-compose-base.yaml
      service: grafana
    environment:
      GF_INSTALL_PLUGINS: 'grafana-llm-app'
      GF_AUTH_BASIC_ENABLED: false
      GF_AUTH_ANONYMOUS_ENABLED: true
      GF_SECURITY_ALLOW_EMBEDDING: true
      GF_FEATURE_TOGGLES_ENABLE: 'externalServiceAccounts'
      GF_AUTH_MANAGED_SERVICE_ACCOUNTS_ENABLED: 'true'
      LLM_API_KEY: ${LLM_API_KEY:-}
      PROM_URL: ${PROM_URL:-}
      O11Y_USER: ${O11Y_USER:-}
      O11Y_PWD: ${O11Y_PWD:-}
      GF_TRACING_OPENTELEMETRY_OTLP_ADDRESS: tempo:4317
      GF_TRACING_OPENTELEMETRY_OTLP_INSECURE: 'true'
    depends_on:
      - tempo

  # Graphiti REST API — provides POST /v1/episodes and POST /v1/search.
  # Uses the Grafana LLM app as the OpenAI-compatible backend for entity extraction:
  #   set GRAPHITI_OPENAI_BASE_URL=http://grafana:3000/api/plugins/grafana-llm-app/resources/openai/v1
  # Or provide a direct OPENAI_API_KEY / ANTHROPIC_API_KEY.
  # Verify exact endpoint paths at http://localhost:8002/docs after startup.
  graphiti:
    image: zepai/graphiti:latest
    ports:
      - "127.0.0.1:8002:8000"
    environment:
      OPENAI_BASE_URL: ${GRAPHITI_OPENAI_BASE_URL:-}
      MODEL_NAME: ${GRAPHITI_LLM_MODEL:-large}
      OPENAI_API_KEY: ${LLM_API_KEY}
      NEO4J_URI: bolt://neo4j:${NEO4J_PORT:-7687}
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      NEO4J_PORT: ${NEO4J_PORT:-7687}

  neo4j:
     image: neo4j:5.22.0
     ports:
        - "7474:7474"  # HTTP
        - "${NEO4J_PORT}:${NEO4J_PORT}"  # Bolt
     volumes:
        - neo4j_data:/data
     environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
  tempo:
    image: grafana/tempo:2.8.1
    command: -config.file=/etc/tempo.yaml
    volumes:
      - ./provisioning/tempo.yaml:/etc/tempo.yaml
    ports:
      - '4317:4317'
      - '3200:3200'

volumes:
  neo4j_data:
