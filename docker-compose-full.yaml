services:

  grafana:
    extends:
      file: .config/docker-compose-base.yaml
      service: grafana
    environment:
      GF_INSTALL_PLUGINS: 'grafana-llm-app'
      GF_AUTH_BASIC_ENABLED: true
      GF_AUTH_ANONYMOUS_ENABLED: false
      GF_SECURITY_ALLOW_EMBEDDING: true
      GF_FEATURE_TOGGLES_ENABLE: 'externalServiceAccounts'
      GF_AUTH_MANAGED_SERVICE_ACCOUNTS_ENABLED: 'true'
      LLM_API_KEY: ${LLM_API_KEY:-}
    depends_on:
      redis:
        condition: service_healthy

  mcp-grafana:
    image: grafana/mcp-grafana
    ports:
      - 127.0.0.1:8001:8000/tcp
    environment:
      GRAFANA_URL: http://grafana:3000
      GRAFANA_USERNAME: admin
      GRAFANA_PASSWORD: admin
      PORT: 8000
    command: >
      -t streamable-http --log-level debug --disable-incident	--disable-oncall	--disable-sift	--disable-admin	--disable-asserts	--disable-annotations
    depends_on:
      - grafana

  graphiti:
    build: ./docker/graphiti
    ports:
      - '127.0.0.1:8002:8000'
    environment:
      ANTHROPIC_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${GRAPHITI_LLM_MODEL:-claude-haiku-4-5-20251001}
      OPENAI_API_KEY: ollama
      OPENAI_BASE_URL: http://ollama:11434/v1
      OLLAMA_URL: http://ollama:11434/v1
      EMBEDDING_MODEL: ${GRAPHITI_EMBEDDING_MODEL:-nomic-embed-text}
      EMBEDDING_DIM: ${GRAPHITI_EMBEDDING_DIM:-768}
      GRAPHITI_GROUP_ID: ${GRAPHITI_GROUP_ID:-main}
      NEO4J_URI: bolt://neo4j:${NEO4J_PORT:-7687}
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      CONFIG_PATH: /app/mcp/config/config.yaml
    volumes:
      - ./provisioning/.config/graphiti.yaml:/app/mcp/config/config.yaml:ro
      - ./provisioning/.config/graphiti-sitecustomize.py:/usr/local/lib/python3.11/sitecustomize.py:ro
    depends_on:
      neo4j:
        condition: service_healthy
      ollama:
        condition: service_started

  ollama:
    image: ollama/ollama
    ports:
      - '127.0.0.1:11434:11434'
    volumes:
      - ollama_data:/root/.ollama

  neo4j:
    image: neo4j:5.26.0
    ports:
      - "7474:7474"  # HTTP
      - "${NEO4J_PORT:-7687}:${NEO4J_PORT:-7687}"  # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
    healthcheck:
      test: ["CMD", "wget", "-O", "/dev/null", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mcpo:
    image: ghcr.io/open-webui/mcpo
    ports:
      - 127.0.0.1:8000:8000/tcp
    volumes:
      - ./provisioning/.config:/config:ro
    command: >
      --config /config/mcpo.json
    depends_on:
      - mcp-grafana

volumes:
  redis-data:
  neo4j_data:
  neo4j_logs:
  ollama_data:
