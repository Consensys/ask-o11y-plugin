services:

  grafana:
    extends:
      file: .config/docker-compose-base.yaml
      service: grafana
    environment:
      GF_INSTALL_PLUGINS: 'grafana-llm-app'
      GF_AUTH_BASIC_ENABLED: true
      GF_AUTH_ANONYMOUS_ENABLED: false
      GF_SECURITY_ALLOW_EMBEDDING: true
      GF_FEATURE_TOGGLES_ENABLE: 'externalServiceAccounts'
      GF_AUTH_MANAGED_SERVICE_ACCOUNTS_ENABLED: 'true'
      LLM_API_KEY: ${LLM_API_KEY:-}
    depends_on:
      redis:
        condition: service_healthy

  mcp-grafana:
    image: grafana/mcp-grafana
    ports:
      - 127.0.0.1:8001:8000/tcp
    environment:
      GRAFANA_URL: http://grafana:3000
      GRAFANA_USERNAME: admin
      GRAFANA_PASSWORD: admin
      PORT: 8000
    command: >
      -t streamable-http --log-level debug --disable-incident	--disable-oncall	--disable-sift	--disable-admin	--disable-asserts	--disable-annotations
    depends_on:
      - grafana

  falkordb:
    image: falkordb/falkordb:latest
    volumes:
      - falkordb-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Graphiti REST API for knowledge graph. Shared across all orgs; per-org isolation
  # is enforced via group_id ("org_1", "org_2", …) set by the Go backend on every call.
  # Verify endpoint paths at http://localhost:8003/docs after startup.
  graphiti:
    image: zepai/graphiti:latest
    ports:
      - "127.0.0.1:8003:8000"
    environment:
      FALKORDB_URI: redis://falkordb:6379
      OPENAI_API_KEY: ${LLM_API_KEY:-dummy}
      OPENAI_BASE_URL: ${GRAPHITI_OPENAI_BASE_URL:-}
      LLM_MODEL_NAME: ${GRAPHITI_LLM_MODEL:-large}
      GRAPH_DATABASE_PROVIDER: falkordb
    depends_on:
      falkordb:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mcpo:
    image: ghcr.io/open-webui/mcpo
    ports:
      - 127.0.0.1:8000:8000/tcp
    volumes:
      - ./mcpo:/mcpo
    command: >
      --config /mcpo/config.json
    depends_on:
      - mcp-grafana

volumes:
  redis-data:
  falkordb-data:
