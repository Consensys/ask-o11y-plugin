# CI: version is bumped by release-please on release; branch/PR builds stay at the
# last published semver, so the catalog "must be newer" rule does not apply here.
# See https://github.com/grafana/plugin-validator#using-a-configuration-file
global:
  enabled: true
  jsonOutput: false
  reportAll: false

analyzers:
  # Run @grafana/react-detect directly via npm instead. The validator invokes its
  # embedded reactcompat pass from the extracted plugin zip, where webpack.config.ts
  # is absent, so it cannot detect the externalized JSX runtime and reports a false
  # positive for dependencies such as streamdown.
  reactcompat:
    enabled: false
  version:
    enabled: false
