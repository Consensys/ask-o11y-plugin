apiVersion: 1

apps:
  - type: grafana-llm-app
    org_id: 1
    jsonData:
      enableDevSandbox: true
      provider: anthropic
      models:
        default: large
        mapping:
          base: claude-haiku-4-5-20251001
          large: claude-haiku-4-5-20251001
    secureJsonData:
      anthropicKey: $LLM_API_KEY
  - type: consensys-asko11y-app
    org_id: 1
    jsonData:
      useBuiltInMCP: true
      graphitiEnabled: true
      graphitiURL: 'http://graphiti:8000'
      # Knowledge graph is accessed server-side only (Go backend → /v1/search,
      # /v1/episodes, /v1/messages). It is NOT exposed as an MCP server to the
      # agent because the Graphiti OpenAPI surface includes destructive endpoints
      # (POST /clear, DELETE /group/{id}) that the agent must never call.
      mcpServers: []
